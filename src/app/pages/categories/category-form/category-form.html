<nav class="mb-5">
    <ol class="breadcrumb">
        <li class="breadcrumb-item">
            <a routerLink="/">Home</a>
        </li>
        <li class="breadcrumb-item">
            <a routerLink="/categories">Categorias</a>
        </li>
        <li class="breadcrumb-item active">
            {{pageTitle}}
        </li>
    </ol>
</nav>

<div class="row mb-4">
    <div class="col-md">
        <h1 class="h2 border-left pl-2">
            {{pageTitle}}
        </h1>
</div>

<div class="col-mb">
    <a routerLink="/categories" class="btn btn-light float-right">
       << Voltar
    </a>
</div>

<form [formGroup]="categoryForm" (ngSubmit)="submitForm()">
    <div class="card">
        <div class="card-header">
            Dados da Categoria
        </div>
        <div class="card-body">
            <div class="form-row">
                <div class="form-group col-md-4">
                    <label for="name">Name</label>
                    <input type="text" class="form-control" id="name" formControlName="name">
                </div>

                <div class="text-danger" *ngIf="categoryForm.get('name')?.invalid && categoryForm.get('name')?.touched">
                        <div *ngIf="categoryForm.get('name')?.errors?.['required']">O campo nome é obrigatório.</div>
                        <div *ngIf="categoryForm.get('name')?.errors?.['minlength']">O campo nome deve conter no mínimo 2 caracteres.</div>
                </div>

                <div class="form-group col-md-8">
                    <label for="description">Descrição</label>
                    <input type="text" class="form-control" id="description" formControlName="description">
                </div>
            </div>
        </div>
    </div>

    <div class="alert alert-danger mt-4" *ngIf="serverErrorMessages">
        <strong>Erro no Servidor:</strong>
        <ul>
            <li *ngFor="let error of serverErrorMessages">{{error}}</li>
        </ul>
    </div>


    <button [disabled]="submitingForm || !categoryForm.valid" type="submit" class="btn btn-primary btn-lg float-right mt-3">Salvar</button>
</form>
